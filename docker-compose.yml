version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8483:8483"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - DATABASE_URL=sqlite:////app/data/project2note.db
      - CHROMA_DIR=/app/data/chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3015:80"
    depends_on:
      - backend
